      <path d="M4 12 L8 20 L12 12 L16 20 L20 12 L24 20 L28 12" fill="none" stroke="url(#goldFull)" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    <!-- Text: KM GLOBAL -->
    <text x="88" y="38" font-family="'Be Vietnam Pro', system-ui, sans-serif" font-size="22" font-weight="700" fill="#ffffff" letter-spacing="0.12em">KM GLOBAL</text>
    <!-- Text: ACADEMY -->
